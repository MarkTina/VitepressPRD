  // ============================================================
  // 2. 路由
  // ============================================================
  const route = reactive({ name: 'dashboard', params: {} });

  function parseHash() {
    const hash = location.hash.replace(/^#/, '') || '/dashboard';
    const seg = hash.split('/').filter(Boolean);
    if (seg.length === 0) return { name: 'dashboard', params: {} };
    if (seg[0] === 'dashboard') return { name: 'dashboard', params: {} };
    if (seg[0] === 'templates') {
      if (!seg[1]) return { name: 'template-list', params: {} };
      if (seg[1] === 'review') return { name: 'template-review', params: {} };
      if (seg[1] === 'edit') return { name: 'template-edit', params: { id: seg[2] } };
      return { name: 'template-detail', params: { id: seg[1] } };
    }
    if (seg[0] === 'signatures') return { name: 'signature-list', params: {} };
    if (seg[0] === 'quotas') {
      if (!seg[1]) return { name: 'quota-list', params: {} };
      if (seg[1] === 'edit') return { name: 'quota-edit', params: { tenant: seg[2] } };
    }
    if (seg[0] === 'logs') {
      if (!seg[1]) return { name: 'send-log', params: {} };
      return { name: 'log-detail', params: { id: seg[1] } };
    }
    if (seg[0] === 'channels') return { name: 'channel-config', params: {} };
    if (seg[0] === 'api-keys') return { name: 'api-key', params: {} };
    return { name: 'dashboard', params: {} };
  }

  function syncRoute() {
    const r = parseHash();
    route.name = r.name;
    route.params = r.params;
  }

  window.addEventListener('hashchange', syncRoute);

  const navigate = (path) => { location.hash = path; };

  // ============================================================
  // 3. 公共组件
  // ============================================================
  const StatusBadge = {
    props: ['status'],
    setup(props) {
      const map = {
        active: { tone: 'emerald', label: '已启用' },
        approved: { tone: 'emerald', label: '已通过' },
        inactive: { tone: 'slate', label: '已停用' },
        draft: { tone: 'slate', label: '草稿' },
        reviewing: { tone: 'amber', label: '待审核' },
        success: { tone: 'emerald', label: '发送成功' },
        failed: { tone: 'rose', label: '发送失败' },
        sending: { tone: 'sky', label: '发送中' },
        queued: { tone: 'slate', label: '已入队' },
        rate_limited: { tone: 'amber', label: '限流重试' },
        normal: { tone: 'emerald', label: '正常' },
        warning: { tone: 'amber', label: '接近上限' },
        exceeded: { tone: 'rose', label: '已超限' },
      };
      return () => {
        const c = map[props.status] || { tone: 'slate', label: props.status };
        const classMap = {
          emerald: 'bg-emerald-100 text-emerald-700',
          rose: 'bg-rose-100 text-rose-700',
          amber: 'bg-amber-100 text-amber-700',
          sky: 'bg-sky-100 text-sky-700',
          slate: 'bg-slate-100 text-slate-600',
        };
        return h('span', { class: `inline-flex px-2 py-0.5 rounded-full text-xs font-medium ${classMap[c.tone]}` }, c.label);
      };
    }
  };

  const Card = {
    props: ['title', 'subtitle'],
    setup(props, { slots }) {
      return () => h('div', { class: 'bg-white rounded-xl shadow-sm border border-slate-200 p-5 lg:p-6' }, [
        (props.title || props.subtitle) && h('div', { class: 'mb-4 flex items-center justify-between' }, [
          h('div', null, [
            props.title && h('h3', { class: 'text-base font-semibold text-slate-800' }, props.title),
            props.subtitle && h('p', { class: 'text-xs text-slate-500 mt-1' }, props.subtitle),
          ]),
          slots.actions && slots.actions(),
        ]),
        slots.default && slots.default(),
      ]);
    }
  };

  const StatCard = {
    props: ['label', 'value', 'tone', 'hint'],
    setup(props) {
      const toneMap = {
        indigo: 'from-indigo-500 to-indigo-600',
        emerald: 'from-emerald-500 to-emerald-600',
        amber: 'from-amber-500 to-amber-600',
        rose: 'from-rose-500 to-rose-600',
        slate: 'from-slate-500 to-slate-600',
        sky: 'from-sky-500 to-sky-600',
      };
      return () => h('div', { class: 'bg-white rounded-xl shadow-sm border border-slate-200 p-5 overflow-hidden relative' }, [
        h('p', { class: 'text-xs font-medium text-slate-500' }, props.label),
        h('p', { class: 'mt-2 text-3xl font-bold text-slate-800' }, props.value),
        props.hint && h('p', { class: 'mt-1 text-xs text-slate-400' }, props.hint),
        h('div', { class: `absolute top-0 left-0 h-1 w-full bg-gradient-to-r ${toneMap[props.tone || 'indigo']}` }),

                ]),
                h(StatusBadge, { status: l.status }),
              ])
            ))
          }),
        ]),
      ]);
    }
  };

                h('td', { class: 'px-3 py-2.5 font-mono text-xs text-slate-500' }, k.id),
                h('td', { class: 'px-3 py-2.5' }, k.tenantName),
                h('td', { class: 'px-3 py-2.5 font-mono text-xs' }, k.apiKey),
                h('td', { class: 'px-3 py-2.5 text-slate-500 text-xs' }, k.createdAt),
                h('td', { class: 'px-3 py-2.5 text-slate-500 text-xs' }, k.lastUsed),
                h('td', { class: 'px-3 py-2.5' }, h(StatusBadge, { status: k.status })),
                h('td', { class: 'px-3 py-2.5' }, h('div', { class: 'flex gap-2' }, [
                  h('button', { class: 'text-indigo-600 hover:text-indigo-700 text-xs font-medium' }, '重置'),
                  h('button', { class: 'text-rose-600 hover:text-rose-700 text-xs font-medium' }, '禁用'),
                ])),
              ])
            ))
          ])
        )
      });
    }
  };

  // ============================================================
  // 5. 页面映射 / 侧栏 / 面包屑
  // ============================================================
  const PAGES = {
    'dashboard': { comp: PageDashboard, title: '服务总览', group: '概览', hash: '/dashboard' },
    'template-list': { comp: PageTemplateList, title: '模板列表', group: '模板管理', hash: '/templates' },
    'template-detail': { comp: PageTemplateDetail, title: '模板详情', group: '模板管理', hash: '/templates/TPL001', parent: 'template-list' },
    'template-edit': { comp: PageTemplateEdit, title: '新建/编辑模板', group: '模板管理', hash: '/templates/edit/new', parent: 'template-list' },
    'template-review': { comp: PageTemplateReview, title: '模板审核', group: '模板管理', hash: '/templates/review' },
    'signature-list': { comp: PageSignatureList, title: '签名管理', group: '模板管理', hash: '/signatures' },
    'quota-list': { comp: PageQuotaList, title: '租户配额', group: '配额管理', hash: '/quotas' },
    'quota-edit': { comp: PageQuotaEdit, title: '调整配额', group: '配额管理', hash: '/quotas/edit/T001', parent: 'quota-list' },
    'send-log': { comp: PageSendLog, title: '发送日志', group: '监控', hash: '/logs' },
    'log-detail': { comp: PageLogDetail, title: '日志详情', group: '监控', hash: '/logs/M20260511001', parent: 'send-log' },
    'channel-config': { comp: PageChannelConfig, title: '短信渠道', group: '系统', hash: '/channels' },
    'api-key': { comp: PageApiKey, title: 'API Key 管理', group: '系统', hash: '/api-keys' },
  };

  const SIDEBAR_GROUPS = [
    { group: '概览', items: [{ name: 'dashboard', label: '服务总览', icon: '▦' }] },
    { group: '模板管理', items: [
      { name: 'template-list', label: '模板列表', icon: '▤' },
      { name: 'template-review', label: '模板审核', icon: '✓' },
      { name: 'signature-list', label: '签名管理', icon: '✎' },
    ]},
    { group: '配额管理', items: [{ name: 'quota-list', label: '租户配额', icon: '◔' }] },
    { group: '监控', items: [{ name: 'send-log', label: '发送日志', icon: '⌗' }] },
    { group: '系统', items: [
      { name: 'channel-config', label: '短信渠道', icon: '⇄' },
      { name: 'api-key', label: 'API Key 管理', icon: '⚿' },
    ]},
  ];

  function isItemActive(name) {
    if (route.name === name) return true;
    const cur = PAGES[route.name];
    return cur && cur.parent === name;
  }

  const Sidebar = {
    props: ['mobileOpen'],
    emits: ['close'],
    setup(props, { emit }) {
      return () => h('aside', {
        class: [
          'fixed lg:sticky top-0 left-0 h-screen w-64 lg:w-60 bg-white border-r border-slate-200 z-40 transform transition-transform',
          props.mobileOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0',
        ].join(' '),
      }, [
        h('div', { class: 'h-16 px-5 flex items-center border-b border-slate-200' }, [
          h('div', { class: 'w-8 h-8 rounded-lg bg-indigo-600 text-white flex items-center justify-center font-bold text-sm mr-3' }, 'SMS'),
          h('div', null, [
            h('p', { class: 'text-sm font-semibold text-slate-800 leading-tight' }, '短信微服务'),
            h('p', { class: 'text-xs text-slate-400 leading-tight' }, 'F-101 Prototype'),
          ]),
        ]),
        h('nav', { class: 'p-3 overflow-y-auto scrollbar-thin', style: { height: 'calc(100vh - 4rem)' } },
          SIDEBAR_GROUPS.map(g => h('div', { class: 'mb-4' }, [
            h('p', { class: 'px-3 mb-1.5 text-xs font-medium text-slate-400 uppercase tracking-wide' }, g.group),
            h('ul', { class: 'space-y-0.5' }, g.items.map(item => {
              const active = isItemActive(item.name);
              return h('li', null, h('a', {
                class: [
                  'flex items-center gap-2 px-3 py-2 rounded-lg text-sm cursor-pointer transition-colors',
                  active ? 'bg-indigo-50 text-indigo-700 font-medium' : 'text-slate-600 hover:bg-slate-50',
                ].join(' '),
                onClick: () => { navigate(PAGES[item.name].hash); emit('close'); },
              }, [
                h('span', { class: 'w-5 text-center text-base' }, item.icon),
                h('span', null, item.label),
              ]));
            }))
          ]))
        ),
      ]);
    }
  };

  const TopBar = {
    emits: ['toggle-menu'],
    setup(_, { emit }) {
      return () => h('header', { class: 'h-16 bg-white border-b border-slate-200 px-4 lg:px-6 flex items-center justify-between sticky top-0 z-30' }, [
        h('div', { class: 'flex items-center gap-3' }, [
          h('button', { class: 'lg:hidden w-9 h-9 rounded-lg hover:bg-slate-100 flex items-center justify-center text-slate-600', onClick: () => emit('toggle-menu') },
            h('span', { class: 'text-xl' }, '☰')
          ),
          h('div', null, [
            h('p', { class: 'text-xs text-slate-400' }, (PAGES[route.name] || {}).group || ''),
            h('p', { class: 'text-base font-semibold text-slate-800' }, (PAGES[route.name] || {}).title || ''),
          ]),
        ]),
        h('div', { class: 'flex items-center gap-3' }, [
          h('div', { class: 'hidden sm:flex items-center gap-1 px-3 py-1.5 rounded-lg bg-emerald-50 text-emerald-700 text-xs font-medium' }, [
            h('span', { class: 'w-1.5 h-1.5 rounded-full bg-emerald-500' }),
            h('span', null, '服务运行中'),
          ]),
          h('div', { class: 'w-9 h-9 rounded-full bg-indigo-100 text-indigo-700 flex items-center justify-center text-sm font-medium' }, '运'),
        ]),
      ]);
    }
  };

  // ============================================================
  // 6. 全局模式 overlay
  // ============================================================
  const GlobalOverview = {
    props: ['open'],
    emits: ['close'],
    setup(props, { emit }) {
      const zoom = ref(0.25);
      const escHandler = (e) => { if (e.key === 'Escape') emit('close'); };
      watch(() => props.open, (v) => {
        if (v) document.addEventListener('keydown', escHandler);
        else document.removeEventListener('keydown', escHandler);
      });
      onUnmounted(() => document.removeEventListener('keydown', escHandler));

      const pageList = Object.keys(PAGES).map(name => ({ name, ...PAGES[name] }));

      return () => h('div', {
        class: [
          'fixed inset-0 bg-slate-900/95 z-50 transition-opacity duration-200',
          props.open ? 'opacity-100' : 'opacity-0 pointer-events-none',
        ].join(' '),
      }, [
        h('div', { class: 'h-16 px-6 flex items-center justify-between border-b border-slate-700' }, [
          h('div', { class: 'text-white' }, [
            h('p', { class: 'text-sm font-semibold' }, '全局模式 · F-101 短信微服务'),
            h('p', { class: 'text-xs text-slate-400 mt-0.5' }, `${pageList.length} 个页面 · 点击缩略图进入对应页面 · Esc 关闭`),
          ]),
          h('div', { class: 'flex items-center gap-4' }, [
            h('div', { class: 'flex items-center gap-2 text-white text-xs' }, [
              h('span', null, '缩放'),
              h('input', { type: 'range', min: '0.15', max: '0.5', step: '0.01', value: zoom.value, onInput: e => zoom.value = parseFloat(e.target.value), class: 'w-32' }),
              h('span', { class: 'font-mono w-10' }, Math.round(zoom.value * 100) + '%'),
            ]),
            h('button', { class: 'w-9 h-9 rounded-lg bg-slate-800 text-white hover:bg-slate-700 flex items-center justify-center', onClick: () => emit('close') }, '✕'),
          ]),
        ]),
        h('div', { class: 'p-6 overflow-y-auto scrollbar-thin', style: { height: 'calc(100vh - 4rem)' } },
          h('div', { class: 'grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-5' },
            pageList.map(p => h('div', {
              class: 'cursor-pointer group',
              onClick: () => { navigate(p.hash); emit('close'); },
            }, [
              h('div', { class: 'aspect-[16/10] overflow-hidden bg-white rounded-lg ring-1 ring-slate-700 group-hover:ring-2 group-hover:ring-indigo-400 transition relative' }, [
                h('div', {
                  class: 'thumb-wrap thumb-frame',
                  style: { transform: `scale(${zoom.value * 0.42})` },
                }, h(ThumbnailPage, { pageName: p.name })),
              ]),
              h('p', { class: 'mt-2 text-sm text-white font-medium' }, p.title),
              h('p', { class: 'text-xs text-slate-400 mt-0.5' }, p.group),
            ]))
          )
        ),
      ]);
    }
  };

  // 缩略图独立渲染:用一个简化的布局,让页面组件在固定尺寸内渲染
  const ThumbnailPage = {
    props: ['pageName'],
    setup(props) {
      const page = computed(() => PAGES[props.pageName]);
      return () => h('div', { class: 'w-full h-full bg-slate-50 flex' }, [
        h('div', { class: 'w-60 bg-white border-r border-slate-200 flex-shrink-0' }, [
          h('div', { class: 'h-16 px-5 flex items-center border-b border-slate-200' }, [
            h('div', { class: 'w-8 h-8 rounded-lg bg-indigo-600 text-white flex items-center justify-center font-bold text-sm mr-3' }, 'SMS'),
            h('div', null, [
              h('p', { class: 'text-sm font-semibold text-slate-800' }, '短信微服务'),
              h('p', { class: 'text-xs text-slate-400' }, 'F-101'),
            ]),
          ]),
          h('div', { class: 'p-3' }, SIDEBAR_GROUPS.map(g => h('div', { class: 'mb-3' }, [
            h('p', { class: 'px-3 mb-1 text-xs font-medium text-slate-400 uppercase' }, g.group),
            g.items.map(i => h('div', {
              class: ['flex items-center gap-2 px-3 py-2 rounded-lg text-sm', i.name === page.value.parent || i.name === props.pageName ? 'bg-indigo-50 text-indigo-700 font-medium' : 'text-slate-600'].join(' ')
            }, [h('span', null, i.icon), h('span', null, i.label)]))
          ]))),
        ]),
        h('div', { class: 'flex-1 flex flex-col' }, [
          h('div', { class: 'h-16 bg-white border-b border-slate-200 px-6 flex items-center' }, [
            h('div', null, [
              h('p', { class: 'text-xs text-slate-400' }, page.value.group),
              h('p', { class: 'text-base font-semibold text-slate-800' }, page.value.title),
            ]),
          ]),
          h('div', { class: 'flex-1 p-6 overflow-hidden' }, h(page.value.comp)),
        ]),
      ]);
    }
  };

  // ============================================================
  // 7. 根组件
  // ============================================================
  const App = {
    setup() {
      const mobileMenu = ref(false);
      const globalMode = ref(false);
      onMounted(() => { syncRoute(); });
      const breadcrumb = computed(() => {
        const cur = PAGES[route.name];
        if (!cur) return [];
        const trail = [{ label: cur.group }];
        if (cur.parent) trail.push({ label: PAGES[cur.parent].title, hash: PAGES[cur.parent].hash });
        trail.push({ label: cur.title });
        return trail;
      });
      return () => h('div', { class: 'min-h-screen flex bg-slate-50' }, [
        h(Sidebar, { mobileOpen: mobileMenu.value, onClose: () => mobileMenu.value = false }),
        // 移动端遮罩
        mobileMenu.value && h('div', { class: 'fixed inset-0 bg-slate-900/40 z-30 lg:hidden', onClick: () => mobileMenu.value = false }),
        h('div', { class: 'flex-1 min-w-0 flex flex-col' }, [
          h(TopBar, { onToggleMenu: () => mobileMenu.value = !mobileMenu.value }),
          // 面包屑
          h('nav', { class: 'bg-slate-50 px-4 lg:px-6 py-3 text-xs text-slate-500' },
            h('div', { class: 'flex items-center gap-1.5 flex-wrap' },
              breadcrumb.value.map((b, i, arr) => [
                b.hash
                  ? h('a', { class: 'hover:text-indigo-600 cursor-pointer', onClick: () => navigate(b.hash) }, b.label)
                  : h('span', { class: i === arr.length - 1 ? 'text-slate-700 font-medium' : '' }, b.label),
                i < arr.length - 1 && h('span', { class: 'text-slate-300' }, '/'),
              ]).flat()
            )
          ),
          h('main', { class: 'flex-1 p-4 lg:p-6' }, h(PAGES[route.name] ? PAGES[route.name].comp : PageDashboard)),
        ]),
        // 全局模式悬浮按钮 - 仅 lg 及以上
        h('button', {
          class: 'fixed bottom-6 right-6 w-14 h-14 rounded-full bg-slate-900 text-white shadow-lg hover:bg-slate-800 hidden lg:flex items-center justify-center text-lg z-40',
          onClick: () => globalMode.value = true,
          title: '打开全局模式',
        }, [
          h('div', { class: 'grid grid-cols-3 gap-0.5 w-5 h-5' }, Array.from({length:9}, () => h('div', { class: 'bg-white rounded-sm' }))),
        ]),
        h(GlobalOverview, { open: globalMode.value, onClose: () => globalMode.value = false }),
      ]);
    }
  };

  const app = createApp(App);
  app.component('StatusBadge', StatusBadge);
  app.component('Card', Card);
  app.mount('#app');
  </script>
</body>
</html>
