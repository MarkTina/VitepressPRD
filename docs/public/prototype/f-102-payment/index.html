  const route = reactive({ name: 'dashboard', params: {} });

  function parseHash() {
    const hash = location.hash.replace(/^#/, '') || '/dashboard';
    const seg = hash.split('/').filter(Boolean);
    if (seg.length === 0) return { name: 'dashboard', params: {} };
    if (seg[0] === 'dashboard') return { name: 'dashboard', params: {} };
    if (seg[0] === 'configs') {
      if (!seg[1]) return { name: 'config-list', params: {} };
      if (seg[1] === 'edit') {
        const mode = seg[2]; const id = seg[3];
        if (mode === 'wechat-split') return { name: 'config-edit-wechat-split', params: { id } };
        if (mode === 'wechat-direct') return { name: 'config-edit-wechat-direct', params: { id } };
        if (mode === 'alipay') return { name: 'config-edit-alipay', params: { id } };
      }
      if (seg[2] === 'split-rule') return { name: 'split-rule-detail', params: { id: seg[1] } };
      return { name: 'config-detail', params: { id: seg[1] } };
    }
    if (seg[0] === 'sites') {
      if (!seg[1]) return { name: 'site-list', params: {} };
      if (seg[2] === 'payment') return { name: 'site-payment', params: { id: seg[1] } };
    }
    if (seg[0] === 'orders') {
      if (!seg[1]) return { name: 'order-list', params: {} };
      return { name: 'order-detail', params: { id: seg[1] } };
    }
    if (seg[0] === 'splits') return { name: 'split-log', params: {} };
    if (seg[0] === 'refunds') return { name: 'refund-list', params: {} };
    if (seg[0] === 'change-logs') return { name: 'change-log', params: {} };
    if (seg[0] === 'alerts') return { name: 'alert-center', params: {} };
    return { name: 'dashboard', params: {} };
  }

  function syncRoute() {
    const r = parseHash();
    route.name = r.name;
    route.params = r.params;
  }

  window.addEventListener('hashchange', syncRoute);
  const navigate = (path) => { location.hash = path; };

        )
      });
    }
  };

  // ---------- 变更日志 ----------
  const PageChangeLog = {
    setup() {
      const actionLabels = { create: '新建', update: '修改', bind: '绑定', disable: '停用', delete: '删除' };
      const actionTones = { create: 'emerald', update: 'sky', bind: 'sky', disable: 'amber', delete: 'rose' };
      return () => h(Card, { title: '变更日志', subtitle: '所有配置创建、修改、绑定、停用操作均有审计记录' }, {
        default: () => h('ol', { class: 'space-y-3' }, store.changeLogs.map(l =>
          h('li', { class: 'flex items-start gap-3 p-3 border border-slate-200 rounded-lg' }, [
            h('span', { class: `inline-flex px-2 py-0.5 rounded-full text-xs font-medium bg-${actionTones[l.action]}-100 text-${actionTones[l.action]}-700 shrink-0 mt-0.5` }, actionLabels[l.action] || l.action),
            h('div', { class: 'flex-1 min-w-0' }, [
              h('p', { class: 'text-sm' }, [
                h('span', { class: 'font-medium' }, l.operator),
                ' 对 ',
                h('span', { class: 'font-medium text-emerald-700' }, l.targetName),
                ' 的 ',
                h('span', { class: 'text-slate-600' }, l.field),
                ' 进行了变更',
              ]),
              h('p', { class: 'text-xs text-slate-500 mt-1' }, l.detail),
              h('p', { class: 'text-xs text-slate-400 mt-1 font-mono' }, l.target + ' · ' + l.createdAt),
            ]),
          ])
        ))
      });
    }
  };

  // ---------- 告警中心 ----------
  const PageAlertCenter = {
    setup() {
      const filter = ref('all');
      const list = computed(() => filter.value === 'all' ? store.alerts : store.alerts.filter(a => a.status === filter.value));
      const resolve = (a) => { a.status = 'resolved'; };
      return () => h(Card, { title: '告警中心', subtitle: `${store.alerts.filter(a => a.status === 'open').length} 个未处理告警` }, {
        actions: () => h('div', { class: 'flex gap-2' }, ['all', 'open', 'resolved'].map(f =>
          h('button', { class: ['px-3 py-1.5 rounded-lg text-xs', filter.value === f ? 'bg-emerald-50 text-emerald-700 ring-1 ring-emerald-200' : 'bg-slate-50 text-slate-500'].join(' '), onClick: () => filter.value = f },
            { all: '全部', open: '未处理', resolved: '已处理' }[f]
          )
        )),
        default: () => h('div', { class: 'space-y-3' }, list.value.map(a =>
          h('div', { class: ['border rounded-lg p-4', a.level === 'critical' ? 'border-rose-200 bg-rose-50/40' : a.level === 'warning' ? 'border-amber-200 bg-amber-50/40' : 'border-sky-200 bg-sky-50/40'].join(' ') }, [
            h('div', { class: 'flex flex-wrap items-start justify-between gap-2' }, [
              h('div', { class: 'flex items-start gap-3' }, [
                h(StatusBadge, { status: a.level }),
                h('div', null, [
                  h('p', { class: 'text-sm font-semibold' }, a.title),
                  h('p', { class: 'text-xs text-slate-600 mt-1' }, a.detail),
                  h('p', { class: 'text-xs text-slate-400 mt-1.5 font-mono' }, '目标 ' + a.target + ' · ' + a.createdAt),
                ]),
              ]),
              h('div', { class: 'flex gap-2' }, [
                h(StatusBadge, { status: a.status }),
                a.status === 'open' && h('button', { class: 'px-3 py-1 rounded-lg bg-emerald-600 text-white text-xs font-medium hover:bg-emerald-700', onClick: () => resolve(a) }, '标记处理'),
              ]),
            ]),
          ])
        ))
      });
    }
  };

  // ============== ADD_PAGES_HERE ==============

  // ============================================================
  // 5. 页面映射 / 侧栏
  // ============================================================
  const PAGES = {
    'dashboard': { comp: PageDashboard, title: '支付总览', group: '概览', hash: '/dashboard' },
    'config-list': { comp: PageConfigList, title: '配置列表', group: '支付配置', hash: '/configs' },
    'config-detail': { comp: PageConfigDetail, title: '配置详情', group: '支付配置', hash: '/configs/PC001', parent: 'config-list' },
    'config-edit-wechat-split': { comp: PageConfigEditWechatSplit, title: '微信分账配置', group: '支付配置', hash: '/configs/edit/wechat-split', parent: 'config-list' },
    'config-edit-wechat-direct': { comp: PageConfigEditWechatDirect, title: '微信直收配置', group: '支付配置', hash: '/configs/edit/wechat-direct', parent: 'config-list' },
    'config-edit-alipay': { comp: PageConfigEditAlipay, title: '支付宝配置', group: '支付配置', hash: '/configs/edit/alipay', parent: 'config-list' },
    'split-rule-detail': { comp: PageSplitRuleDetail, title: '分账规则详情', group: '支付配置', hash: '/configs/PC001/split-rule', parent: 'config-list' },
    'site-list': { comp: PageSiteList, title: '网点列表', group: '网点管理', hash: '/sites' },
    'site-payment': { comp: PageSitePayment, title: '网点支付设置', group: '网点管理', hash: '/sites/S001/payment', parent: 'site-list' },
    'order-list': { comp: PageOrderList, title: '订单查询', group: '交易', hash: '/orders' },
    'order-detail': { comp: PageOrderDetail, title: '订单详情', group: '交易', hash: '/orders/ORD20260511001', parent: 'order-list' },
    'split-log': { comp: PageSplitLog, title: '分账记录', group: '交易', hash: '/splits' },
    'refund-list': { comp: PageRefundList, title: '退款记录', group: '交易', hash: '/refunds' },
    'change-log': { comp: PageChangeLog, title: '变更日志', group: '系统', hash: '/change-logs' },
    'alert-center': { comp: PageAlertCenter, title: '告警中心', group: '系统', hash: '/alerts' },
  };

  const SIDEBAR_GROUPS = [
    { group: '概览', items: [{ name: 'dashboard', label: '支付总览', icon: '▦' }] },
    { group: '支付配置', items: [
      { name: 'config-list', label: '配置列表', icon: '▤' },
    ]},
    { group: '网点管理', items: [
      { name: 'site-list', label: '网点列表', icon: '◉' },
    ]},
    { group: '交易', items: [
      { name: 'order-list', label: '订单查询', icon: '⌗' },
      { name: 'split-log', label: '分账记录', icon: '⇗' },
      { name: 'refund-list', label: '退款记录', icon: '↶' },
    ]},
    { group: '系统', items: [
      { name: 'change-log', label: '变更日志', icon: '⌚' },
      { name: 'alert-center', label: '告警中心', icon: '⚠' },
    ]},
  ];

  function isItemActive(name) {
    if (route.name === name) return true;
    const cur = PAGES[route.name];
    return cur && cur.parent === name;
  }

  const Sidebar = {
    props: ['mobileOpen'],
    emits: ['close'],
    setup(props, { emit }) {
      return () => h('aside', {
        class: [
          'fixed lg:sticky top-0 left-0 h-screen w-64 lg:w-60 bg-white border-r border-slate-200 z-40 transform transition-transform',
          props.mobileOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0',
        ].join(' '),
      }, [
        h('div', { class: 'h-16 px-5 flex items-center border-b border-slate-200' }, [
          h('div', { class: 'w-8 h-8 rounded-lg bg-emerald-600 text-white flex items-center justify-center font-bold text-sm mr-3' }, '¥'),
          h('div', null, [
            h('p', { class: 'text-sm font-semibold text-slate-800 leading-tight' }, '支付架构'),
            h('p', { class: 'text-xs text-slate-400 leading-tight' }, 'F-102 Prototype'),
          ]),
        ]),
        h('nav', { class: 'p-3 overflow-y-auto scrollbar-thin', style: { height: 'calc(100vh - 4rem)' } },
          SIDEBAR_GROUPS.map(g => h('div', { class: 'mb-4' }, [
            h('p', { class: 'px-3 mb-1.5 text-xs font-medium text-slate-400 uppercase tracking-wide' }, g.group),
            h('ul', { class: 'space-y-0.5' }, g.items.map(item => {
              const active = isItemActive(item.name);
              return h('li', null, h('a', {
                class: [
                  'flex items-center gap-2 px-3 py-2 rounded-lg text-sm cursor-pointer transition-colors',
                  active ? 'bg-emerald-50 text-emerald-700 font-medium' : 'text-slate-600 hover:bg-slate-50',
                ].join(' '),
                onClick: () => { if (PAGES[item.name]) { navigate(PAGES[item.name].hash); emit('close'); } },
              }, [
                h('span', { class: 'w-5 text-center text-base' }, item.icon),
                h('span', null, item.label),
              ]));
            }))
          ]))
        ),
      ]);
    }
  };

  const TopBar = {
    emits: ['toggle-menu'],
    setup(_, { emit }) {
      return () => h('header', { class: 'h-16 bg-white border-b border-slate-200 px-4 lg:px-6 flex items-center justify-between sticky top-0 z-30' }, [
        h('div', { class: 'flex items-center gap-3' }, [
          h('button', { class: 'lg:hidden w-9 h-9 rounded-lg hover:bg-slate-100 flex items-center justify-center text-slate-600', onClick: () => emit('toggle-menu') },
            h('span', { class: 'text-xl' }, '☰')
          ),
          h('div', null, [
            h('p', { class: 'text-xs text-slate-400' }, (PAGES[route.name] || {}).group || ''),
            h('p', { class: 'text-base font-semibold text-slate-800' }, (PAGES[route.name] || {}).title || ''),
          ]),
        ]),
        h('div', { class: 'flex items-center gap-3' }, [
          h('div', { class: 'hidden sm:flex items-center gap-1 px-3 py-1.5 rounded-lg bg-emerald-50 text-emerald-700 text-xs font-medium' }, [
            h('span', { class: 'w-1.5 h-1.5 rounded-full bg-emerald-500' }),
            h('span', null, '服务运行中'),
          ]),
          h('div', { class: 'w-9 h-9 rounded-full bg-emerald-100 text-emerald-700 flex items-center justify-center text-sm font-medium' }, '财'),
        ]),
      ]);
    }
  };

  // ============================================================
  // 全局模式
  // ============================================================
  const GlobalOverview = {
    props: ['open'],
    emits: ['close'],
    setup(props, { emit }) {
      const zoom = ref(0.25);
      const escHandler = (e) => { if (e.key === 'Escape') emit('close'); };
      watch(() => props.open, (v) => {
        if (v) document.addEventListener('keydown', escHandler);
        else document.removeEventListener('keydown', escHandler);
      });
      onUnmounted(() => document.removeEventListener('keydown', escHandler));
      const pageList = Object.keys(PAGES).map(name => ({ name, ...PAGES[name] }));
      return () => h('div', {
        class: [
          'fixed inset-0 bg-slate-900/95 z-50 transition-opacity duration-200',
          props.open ? 'opacity-100' : 'opacity-0 pointer-events-none',
        ].join(' '),
      }, [
        h('div', { class: 'h-16 px-6 flex items-center justify-between border-b border-slate-700' }, [
          h('div', { class: 'text-white' }, [
            h('p', { class: 'text-sm font-semibold' }, '全局模式 · F-102 支付架构重构'),
            h('p', { class: 'text-xs text-slate-400 mt-0.5' }, `${pageList.length} 个页面 · 点击进入 · Esc 关闭`),
          ]),
          h('div', { class: 'flex items-center gap-4' }, [
            h('div', { class: 'flex items-center gap-2 text-white text-xs' }, [
              h('span', null, '缩放'),
              h('input', { type: 'range', min: '0.15', max: '0.5', step: '0.01', value: zoom.value, onInput: e => zoom.value = parseFloat(e.target.value), class: 'w-32' }),
              h('span', { class: 'font-mono w-10' }, Math.round(zoom.value * 100) + '%'),
            ]),
            h('button', { class: 'w-9 h-9 rounded-lg bg-slate-800 text-white hover:bg-slate-700 flex items-center justify-center', onClick: () => emit('close') }, '✕'),
          ]),
        ]),
        h('div', { class: 'p-6 overflow-y-auto scrollbar-thin', style: { height: 'calc(100vh - 4rem)' } },
          h('div', { class: 'grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-5' },
            pageList.map(p => h('div', {
              class: 'cursor-pointer group',
              onClick: () => { navigate(p.hash); emit('close'); },
            }, [
              h('div', { class: 'aspect-[16/10] overflow-hidden bg-white rounded-lg ring-1 ring-slate-700 group-hover:ring-2 group-hover:ring-emerald-400 transition' },
                h('div', { class: 'thumb-wrap thumb-frame', style: { transform: `scale(${zoom.value * 0.42})` } },
                  h(ThumbnailPage, { pageName: p.name })
                )
              ),
              h('p', { class: 'mt-2 text-sm text-white font-medium' }, p.title),
              h('p', { class: 'text-xs text-slate-400 mt-0.5' }, p.group),
            ]))
          )
        ),
      ]);
    }
  };

  const ThumbnailPage = {
    props: ['pageName'],
    setup(props) {
      const page = computed(() => PAGES[props.pageName]);
      return () => h('div', { class: 'w-full h-full bg-slate-50 flex' }, [
        h('div', { class: 'w-60 bg-white border-r border-slate-200 flex-shrink-0' }, [
          h('div', { class: 'h-16 px-5 flex items-center border-b border-slate-200' }, [
            h('div', { class: 'w-8 h-8 rounded-lg bg-emerald-600 text-white flex items-center justify-center font-bold text-sm mr-3' }, '¥'),
            h('div', null, [
              h('p', { class: 'text-sm font-semibold text-slate-800' }, '支付架构'),
              h('p', { class: 'text-xs text-slate-400' }, 'F-102'),
            ]),
          ]),
          h('div', { class: 'p-3' }, SIDEBAR_GROUPS.map(g => h('div', { class: 'mb-3' }, [
            h('p', { class: 'px-3 mb-1 text-xs font-medium text-slate-400 uppercase' }, g.group),
            g.items.map(i => h('div', {
              class: ['flex items-center gap-2 px-3 py-2 rounded-lg text-sm', i.name === props.pageName || (PAGES[props.pageName] && PAGES[props.pageName].parent === i.name) ? 'bg-emerald-50 text-emerald-700 font-medium' : 'text-slate-600'].join(' ')
            }, [h('span', null, i.icon), h('span', null, i.label)]))
          ]))),
        ]),
        h('div', { class: 'flex-1 flex flex-col' }, [
          h('div', { class: 'h-16 bg-white border-b border-slate-200 px-6 flex items-center' },
            h('div', null, [
              h('p', { class: 'text-xs text-slate-400' }, page.value.group),
              h('p', { class: 'text-base font-semibold text-slate-800' }, page.value.title),
            ])
          ),
          h('div', { class: 'flex-1 p-6 overflow-hidden' }, h(page.value.comp)),
        ]),
      ]);
    }
  };

  // ============================================================
  // 根组件
  // ============================================================
  const App = {
    setup() {
      const mobileMenu = ref(false);
      const globalMode = ref(false);
      onMounted(() => { syncRoute(); });
      const breadcrumb = computed(() => {
        const cur = PAGES[route.name];
        if (!cur) return [];
        const trail = [{ label: cur.group }];
        if (cur.parent && PAGES[cur.parent]) trail.push({ label: PAGES[cur.parent].title, hash: PAGES[cur.parent].hash });
        trail.push({ label: cur.title });
        return trail;
      });
      return () => h('div', { class: 'min-h-screen flex bg-slate-50' }, [
        h(Sidebar, { mobileOpen: mobileMenu.value, onClose: () => mobileMenu.value = false }),
        mobileMenu.value && h('div', { class: 'fixed inset-0 bg-slate-900/40 z-30 lg:hidden', onClick: () => mobileMenu.value = false }),
        h('div', { class: 'flex-1 min-w-0 flex flex-col' }, [
          h(TopBar, { onToggleMenu: () => mobileMenu.value = !mobileMenu.value }),
          h('nav', { class: 'bg-slate-50 px-4 lg:px-6 py-3 text-xs text-slate-500' },
            h('div', { class: 'flex items-center gap-1.5 flex-wrap' },
              breadcrumb.value.map((b, i, arr) => [
                b.hash
                  ? h('a', { class: 'hover:text-emerald-600 cursor-pointer', onClick: () => navigate(b.hash) }, b.label)
                  : h('span', { class: i === arr.length - 1 ? 'text-slate-700 font-medium' : '' }, b.label),
                i < arr.length - 1 && h('span', { class: 'text-slate-300' }, '/'),
              ]).flat()
            )
          ),
          h('main', { class: 'flex-1 p-4 lg:p-6' }, h(PAGES[route.name] ? PAGES[route.name].comp : PageDashboard)),
        ]),
        h('button', {
          class: 'fixed bottom-6 right-6 w-14 h-14 rounded-full bg-slate-900 text-white shadow-lg hover:bg-slate-800 hidden lg:flex items-center justify-center z-40',
          onClick: () => globalMode.value = true,
          title: '打开全局模式',
        }, h('div', { class: 'grid grid-cols-3 gap-0.5 w-5 h-5' }, Array.from({length:9}, () => h('div', { class: 'bg-white rounded-sm' })))),
        h(GlobalOverview, { open: globalMode.value, onClose: () => globalMode.value = false }),
      ]);
    }
  };

  createApp(App).mount('#app');
  </script>
</body>
</html>
